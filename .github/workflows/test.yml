name: Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # Testa em múltiplas versões do Node para garantir compatibilidade da biblioteca

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm" # Ativa o cache automático do node_modules para rodar mais rápido

      - name: Install dependencies
        run: npm ci

      - name: Run Linter / Formatting (Opcional)
        run: npm run lint --if-present

      - name: Run Tests with Coverage
        run: npm test -- --coverage --watch=false
        # O `--if-present` ou flags extras dependem do seu script, ajuste se necessário

      - name: Verify TypeScript Build
        run: npm run build --if-present
